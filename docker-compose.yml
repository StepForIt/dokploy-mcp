services:
  dokploy-mcp-http:
    build: .
    container_name: dokploy-mcp-http
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - DOKPLOY_URL=${DOKPLOY_URL:-https://your-dokploy-server.com}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-your_token_here}
    restart: unless-stopped

  dokploy-mcp-stdio:
    build: .
    container_name: dokploy-mcp-stdio
    environment:
      - DOKPLOY_URL=${DOKPLOY_URL:-https://your-dokploy-server.com}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-your_token_here}
    restart: "no"
    stdin_open: true
    tty: true
